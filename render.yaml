services:
  - type: web
    name: mhtms
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn mhtms.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: mhtms-db
          property: connectionString

databases:
  - name: mhtms-db
    databaseName: mhtms
    user: mhtms_user
